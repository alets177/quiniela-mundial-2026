<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela · Mundial 2026</title>
  <meta name="description" content="Tablero de la quiniela del Mundial 2026: equipos por participante, grupos, posiciones en vivo, calendario y apuestas.">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#1A3A6C">

  <!-- Open Graph -->
  <meta property="og:title" content="Quiniela · Mundial 2026">
  <meta property="og:description" content="Equipos, grupos, posiciones en vivo, calendario y apuestas de la quiniela.">
  <meta property="og:type" content="website">

  <!-- Favicon (trofeo, inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231A3A6C'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Saltar al contenido</a>
  <div class="wrap">

    <!-- HERO -->
    <header class="hero">
      <div class="hero-pitch"></div>
      <div class="hero-glow"></div>
      <div class="hero-top">
        <div>
          <p class="hero-eyebrow">FIFA World Cup 2026</p>
          <h1 class="hero-title">Quiniela del<br><span>Mundial</span></h1>
          <p class="hero-sub">6 participantes · 8 selecciones por persona · Fase de grupos</p>
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Cambiar tema"></button>
      </div>
      <div class="hero-stats">
        <div class="stat-item"><div class="stat-val" id="stat-pot">$1,200</div><div class="stat-lbl">Bote MXN</div></div>
        <div class="stat-item"><div class="stat-val">48</div><div class="stat-lbl">Selecciones</div></div>
        <div class="stat-item"><div class="stat-val" id="duel-count">—</div><div class="stat-lbl">Duelos directos</div></div>
      </div>
    </header>

    <!-- BARRA DE ESTADO DE LA API -->
    <div class="api-bar">
      <div class="api-status" role="status" aria-live="polite">
        <span class="api-dot loading" id="api-dot" aria-hidden="true"></span>
        <span id="api-status-txt">Conectando…</span>
      </div>
      <button class="refresh-btn" id="refresh-btn" type="button">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
        Actualizar
      </button>
    </div>

    <!-- PRÓXIMO PARTIDO + COUNTDOWN -->
    <div class="next-bar" id="next-bar" style="display:none"></div>

    <!-- LEYENDA -->
    <div class="legend-wrap" id="legend-row" aria-label="Participantes"></div>

    <!-- SELECTOR DE PARTICIPANTE -->
    <div class="me-bar">
      <label for="me-select">Yo soy:</label>
      <select class="me-select" id="me-select" aria-label="Elige tu participante"></select>
    </div>

    <!-- TABS -->
    <div class="tabs-bar" role="tablist" aria-label="Secciones de la quiniela">
      <button class="tab-btn" id="tab-equipos" role="tab" aria-selected="true" aria-controls="equipos" tabindex="0" type="button">Equipos</button>
      <button class="tab-btn" id="tab-yo" role="tab" aria-selected="false" aria-controls="yo" tabindex="-1" type="button">Yo</button>
      <button class="tab-btn" id="tab-grupos" role="tab" aria-selected="false" aria-controls="grupos" tabindex="-1" type="button">Grupos</button>
      <button class="tab-btn" id="tab-tabla" role="tab" aria-selected="false" aria-controls="tabla" tabindex="-1" type="button">Tabla</button>
      <button class="tab-btn" id="tab-calendario" role="tab" aria-selected="false" aria-controls="calendario" tabindex="-1" type="button">Calendario</button>
      <button class="tab-btn" id="tab-eliminatorias" role="tab" aria-selected="false" aria-controls="eliminatorias" tabindex="-1" type="button">Eliminatorias</button>
      <button class="tab-btn" id="tab-apuestas" role="tab" aria-selected="false" aria-controls="apuestas" tabindex="-1" type="button">Apuestas</button>
      <button class="tab-btn" id="tab-records" role="tab" aria-selected="false" aria-controls="records" tabindex="-1" type="button">Récords</button>
    </div>

    <main id="main">
      <section id="equipos" class="panel active" role="tabpanel" aria-labelledby="tab-equipos" tabindex="0"></section>
      <section id="yo" class="panel" role="tabpanel" aria-labelledby="tab-yo" tabindex="0"></section>
      <section id="grupos" class="panel" role="tabpanel" aria-labelledby="tab-grupos" tabindex="0"></section>
      <section id="tabla" class="panel" role="tabpanel" aria-labelledby="tab-tabla" tabindex="0"></section>
      <section id="calendario" class="panel" role="tabpanel" aria-labelledby="tab-calendario" tabindex="0"></section>
      <section id="eliminatorias" class="panel" role="tabpanel" aria-labelledby="tab-eliminatorias" tabindex="0"></section>
      <section id="apuestas" class="panel" role="tabpanel" aria-labelledby="tab-apuestas" tabindex="0"></section>
      <section id="records" class="panel" role="tabpanel" aria-labelledby="tab-records" tabindex="0"></section>
    </main>

    <noscript>
      <p style="padding:16px;color:var(--danger)">Esta página necesita JavaScript habilitado.</p>
    </noscript>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
