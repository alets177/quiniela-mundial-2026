<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela · Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F0F4FA;
  --bg2:      #FFFFFF;
  --bg3:      #E8EEF6;
  --panel:    #FFFFFF;
  --panel2:   #F5F8FD;
  --line:     rgba(0,0,0,0.06);
  --line2:    rgba(0,0,0,0.10);
  --text:     #0F1C2E;
  --text2:    #4A6080;
  --text3:    #8DA0B8;
  --gold:     #D4920A;
  --gold2:    #F0B429;
  --gold-dim: rgba(212,146,10,0.10);
  --gold-glow:rgba(212,146,10,0.18);
  --live:     #16A34A;
  --live-dim: rgba(22,163,74,0.10);
  --radius:   12px;
  --radius-sm:8px;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

/* ─── HERO ─── */
.hero {
  position: relative;
  background: linear-gradient(135deg, #1A3A6C 0%, #0F2350 60%, #1B1464 100%);
  border-radius: 20px;
  padding: 2.25rem 2rem 1.75rem;
  margin-bottom: 1.5rem;
  overflow: hidden;
}
.hero-pitch {
  position: absolute; inset: 0; opacity: 0.06;
  background:
    radial-gradient(ellipse 70% 55% at 50% 50%, #fff 0%, transparent 65%),
    linear-gradient(180deg, transparent 48%, rgba(255,255,255,0.6) 49%, rgba(255,255,255,0.6) 51%, transparent 52%);
}
.hero-pitch::before {
  content:''; position: absolute;
  left:50%; top:50%; transform: translate(-50%,-50%);
  width: 22%; aspect-ratio:1;
  border: 1px solid rgba(255,255,255,0.5); border-radius: 50%;
}
.hero-glow {
  position: absolute; top: -40px; right: -40px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
  pointer-events: none;
}
.hero-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--gold2);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.hero-eyebrow::before {
  content:''; display: inline-block; width: 18px; height: 2px; background: var(--gold2);
}
.hero-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(36px, 8vw, 54px); font-weight: 800;
  line-height: 0.95; letter-spacing: -0.01em;
  color: #fff; text-transform: uppercase; margin-bottom: 6px;
}
.hero-title span { color: var(--gold2); }
.hero-sub {
  font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 1.75rem;
}
.hero-stats {
  display: flex; gap: 0;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: var(--radius-sm); overflow: hidden; width: fit-content;
}
.stat-item {
  padding: 10px 20px;
  border-right: 1px solid rgba(255,255,255,0.2);
  display: flex; flex-direction: column; gap: 3px;
}
.stat-item:last-child { border-right: none; }
.stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px; font-weight: 700; color: #fff; line-height: 1;
}
.stat-lbl {
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
}

/* ─── API STATUS BAR ─── */
.api-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px;
  background: var(--panel); border: 1px solid var(--line2);
  border-radius: var(--radius-sm); margin-bottom: 1rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  flex-wrap: wrap; gap: 8px;
}
.api-status {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: var(--text2);
}
.api-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
  transition: background .3s;
}
.api-dot.live { background: var(--live); box-shadow: 0 0 6px rgba(22,163,74,0.5); }
.api-dot.error { background: #DC2626; }
.api-dot.loading {
  background: var(--gold2);
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.refresh-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: var(--bg3); border: 1px solid var(--line2);
  border-radius: 99px; font-size: 11px; font-weight: 600;
  color: var(--text2); cursor: pointer;
  transition: all .15s; font-family: 'Inter', sans-serif;
}
.refresh-btn:hover { background: var(--line2); color: var(--text); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.refresh-btn svg { transition: transform .6s; }
.refresh-btn.spinning svg { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── LEYENDA ─── */
.legend-wrap {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; align-items: center;
}
.leg-item {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 13px 6px 8px;
  background: #fff; border: 1px solid var(--line2);
  border-radius: 99px; font-size: 12px; font-weight: 500;
  color: var(--text); cursor: default;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: box-shadow .15s;
}
.leg-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

/* ─── TABS ─── */
.tabs-bar {
  display: flex; gap: 4px; margin-bottom: 1.5rem;
  background: #fff; border: 1px solid var(--line2);
  border-radius: var(--radius); padding: 5px;
  width: fit-content; flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.tab-btn {
  padding: 8px 18px; font-size: 12px; font-weight: 600;
  letter-spacing: 0.04em; font-family: 'Inter', sans-serif;
  color: var(--text2); background: transparent;
  border: none; border-radius: var(--radius-sm);
  cursor: pointer; transition: all .18s; white-space: nowrap;
}
.tab-btn:hover { color: var(--text); background: var(--panel2); }
.tab-btn.active { background: #1A3A6C; color: #fff; font-weight: 700; }
.panel { display: none; }
.panel.active { display: block; }

/* ─── SECTION EYEBROW ─── */
.sec-eye {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
}
.sec-eye::after { content:''; flex:1; height:1px; background: var(--line); }

/* ─── OWNER CHIP ─── */
.owner-chip {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 99px;
  font-size: 10px; font-weight: 600;
  white-space: nowrap; flex-shrink: 0; letter-spacing: 0.02em;
}

/* ─── LIVE BADGE ─── */
.live-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 99px;
  background: var(--live-dim); border: 1px solid rgba(22,163,74,0.25);
  font-size: 9px; font-weight: 700; color: var(--live);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.live-badge::before {
  content:''; width:5px; height:5px; border-radius:50%;
  background: var(--live); flex-shrink:0;
  animation: pulse 1s infinite;
}
.fin-badge {
  display: inline-flex; align-items: center;
  padding: 2px 7px; border-radius: 99px;
  background: var(--bg3); border: 1px solid var(--line2);
  font-size: 9px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.sched-badge {
  font-size: 10px; color: var(--text3); font-weight: 500;
}

/* ─── SCORE ─── */
.score-box {
  display: flex; align-items: center; gap: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800; color: var(--text);
  line-height: 1;
}
.score-sep { color: var(--text3); font-size: 16px; }
.score-nil { font-size: 13px; color: var(--text3); font-weight: 500; }

/* ─── PLAYER CARDS ─── */
.players-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 10px; margin-bottom: 2rem;
}
.p-card {
  background: var(--panel); border: 1px solid var(--line2);
  border-radius: var(--radius); overflow: hidden;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.p-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
.p-card-header {
  padding: 14px 14px 12px; display: flex; align-items: center; gap: 11px; position: relative;
}
.p-card-header::after {
  content:''; position: absolute; bottom:0; left:0; right:0;
  height:1px; background: var(--line);
}
.p-avatar {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.9); flex-shrink: 0;
}
.p-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
.p-sub  { font-size: 11px; color: var(--text3); }
.p-teams-list { padding: 6px 0 4px; }
.p-team-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 14px; font-size: 12px; color: var(--text2);
  transition: background .1s;
}
.p-team-row:hover { background: var(--panel2); }
.p-rank-badge {
  font-size: 10px; font-weight: 600; color: var(--text3);
  background: var(--bg3); border-radius: 4px; padding: 1px 5px;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.04em;
  border: 1px solid var(--line2);
}

/* ─── GRUPOS ─── */
.groups-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 8px; margin-bottom: 2rem;
}
.g-card {
  background: var(--panel); border: 1px solid var(--line2);
  border-radius: var(--radius-sm); overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.g-header {
  background: #1A3A6C; padding: 7px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: #fff;
  border-bottom: 1px solid var(--line2);
}
.g-team-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px 6px 12px; font-size: 12px; color: var(--text2);
  border-bottom: 1px solid var(--line); transition: background .1s;
}
.g-team-row:last-child { border-bottom: none; }
.g-team-row:hover { background: var(--panel2); }

/* ─── TABLA POSICIONES ─── */
.standings-section { margin-bottom: 2rem; }
.standings-group { margin-bottom: 1rem; }
.standings-group-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: #fff;
  background: #1A3A6C; padding: 6px 12px;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
}
.standings-table {
  width: 100%; border-collapse: collapse;
  background: var(--panel);
  border: 1px solid var(--line2);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  font-size: 12px;
}
.standings-table th {
  padding: 6px 10px; text-align: center;
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3);
  background: var(--bg3); border-bottom: 1px solid var(--line2);
}
.standings-table th:first-child { text-align: left; }
.standings-table td {
  padding: 7px 10px; text-align: center;
  border-bottom: 1px solid var(--line); color: var(--text2);
  font-variant-numeric: tabular-nums;
}
.standings-table td:first-child { text-align: left; color: var(--text); font-weight: 500; }
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr:hover td { background: var(--panel2); }
.st-pos {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--text3);
  margin-right: 6px;
}
.st-pts { font-weight: 700; color: var(--text) !important; }
.standings-table tr.advancing td { background: rgba(22,163,74,0.04); }
.standings-table tr.advancing td:first-child { border-left-color: var(--live) !important; }
.standings-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}

/* ─── CALENDARIO ─── */
.cal-notice {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--gold-dim); border: 1px solid rgba(240,180,41,0.2);
  border-radius: var(--radius-sm); font-size: 12px;
  color: var(--gold); margin-bottom: 16px;
}
.day-block { margin-bottom: 1.5rem; }
.day-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text3);
  padding-bottom: 8px; margin-bottom: 6px;
  border-bottom: 1px solid var(--line);
}
.match-card {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 6px;
  background: var(--panel); border: 1px solid var(--line2);
  border-radius: var(--radius-sm); padding: 10px 12px;
  margin-bottom: 4px; transition: border-color .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.match-card.duel {
  border-color: rgba(212,146,10,0.45);
  background: linear-gradient(90deg, rgba(212,146,10,0.05) 0%, var(--panel) 40%);
}
.match-card.live-card {
  border-color: rgba(22,163,74,0.4);
  background: linear-gradient(90deg, rgba(22,163,74,0.05) 0%, var(--panel) 40%);
}
.m-team-col {
  display: flex; flex-direction: column; gap: 3px;
}
.m-team-col.right { align-items: flex-end; }
.m-team-name { font-size: 12px; color: var(--text); font-weight: 500; }
.m-center-col {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; min-width: 80px;
}
.m-meta-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--text3);
  margin-top: 4px; flex-wrap: wrap;
}
.m-group-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--line2);
  padding: 1px 6px; border-radius: 4px;
}
.m-duel-tag {
  font-size: 9px; font-weight: 700; color: var(--gold);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.1em; text-transform: uppercase;
}

/* ─── APUESTAS ─── */
.bet-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px; margin-bottom: 2rem;
}
.bet-card {
  background: var(--panel); border: 1px solid var(--line2);
  border-radius: var(--radius); padding: 1.25rem;
  position: relative; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.bet-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
.bet-card.rec { border-color: rgba(212,146,10,0.4); }
.bet-card.rec::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:3px; background: var(--gold2);
}
.bet-num {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
}
.bet-card.rec .bet-num { color: var(--gold); }
.bet-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.bet-body { font-size: 12px; color: var(--text2); line-height: 1.7; }
.bet-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
.chip {
  font-size: 10px; font-weight: 600; padding: 3px 9px;
  border-radius: 99px; background: var(--bg3);
  color: var(--text2); border: 1px solid var(--line2);
}
.bet-card.rec .chip {
  background: var(--gold-dim); border-color: rgba(212,146,10,0.25); color: var(--gold);
}

/* ─── DUEL ROWS ─── */
.duel-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; background: #fff;
  border: 1px solid var(--line2); border-radius: var(--radius-sm);
  margin-bottom: 4px; font-size: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.duel-date { min-width: 85px; font-size: 10px; color: var(--text3); line-height: 1.5; flex-shrink:0; }
.duel-vs { flex:1; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.duel-team { display:flex; flex-direction:column; gap:2px; }
.duel-slash { font-size:10px; color:var(--text3); }
.duel-group {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:0.1em; color:var(--text2); background:var(--bg3);
  padding:2px 7px; border-radius:4px; flex-shrink:0; border:1px solid var(--line2);
}

/* ─── SKELETON LOADER ─── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
  background-size: 200% 100%; border-radius: 6px;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-line { height: 14px; margin-bottom: 8px; }
.skel-card {
  height: 60px; border-radius: var(--radius-sm);
  margin-bottom: 4px;
}

/* ─── ERROR BOX ─── */
.error-box {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 14px 16px; background: rgba(220,38,38,0.06);
  border: 1px solid rgba(220,38,38,0.2); border-radius: var(--radius-sm);
  font-size: 13px; color: #B91C1C; margin-bottom: 1rem;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 480px) {
  .hero { padding: 1.5rem 1.25rem 1.25rem; }
  .hero-stats { flex-direction: column; width: 100%; }
  .stat-item { border-right:none; border-bottom:1px solid rgba(255,255,255,0.2); }
  .stat-item:last-child { border-bottom:none; }
  .tabs-bar { gap:2px; padding:4px; }
  .tab-btn { padding:6px 12px; font-size:11px; }
  .standings-grid { grid-template-columns: 1fr; }
  .bet-grid { grid-template-columns: 1fr; }
  .match-card { padding:8px 10px; }
  .m-center-col { min-width:60px; }
}
</style>
</head>
<body>
<div class="wrap">

<!-- HERO -->
<div class="hero">
  <div class="hero-pitch"></div>
  <div class="hero-glow"></div>
  <div class="hero-eyebrow">FIFA World Cup 2026</div>
  <div class="hero-title">Quiniela del<br><span>Mundial</span></div>
  <div class="hero-sub">6 participantes · 8 selecciones por persona · Fase de grupos</div>
  <div class="hero-stats">
    <div class="stat-item"><div class="stat-val">$1,200</div><div class="stat-lbl">Bote MXN</div></div>
    <div class="stat-item"><div class="stat-val">48</div><div class="stat-lbl">Selecciones</div></div>
    <div class="stat-item"><div class="stat-val" id="duel-count">—</div><div class="stat-lbl">Duelos directos</div></div>
  </div>
</div>

<!-- API BAR -->
<div class="api-bar">
  <div class="api-status">
    <div class="api-dot loading" id="api-dot"></div>
    <span id="api-status-txt">Conectando con FIFA API…</span>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadAll()" disabled>
    <svg id="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
    Actualizar
  </button>
</div>

<!-- LEYENDA -->
<div class="legend-wrap" id="legend-row"></div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="show('equipos',this)">Equipos</button>
  <button class="tab-btn" onclick="show('grupos',this)">Grupos</button>
  <button class="tab-btn" onclick="show('tabla',this)">Tabla</button>
  <button class="tab-btn" onclick="show('calendario',this)">Calendario</button>
  <button class="tab-btn" onclick="show('apuestas',this)">Apuestas</button>
</div>

<div id="equipos"   class="panel active"></div>
<div id="grupos"    class="panel"></div>
<div id="tabla"     class="panel"></div>

const API_KEY  = '55274e0f8b9b40b096f3513cac43496b';
const BASE_URL = 'https://api.football-data.org/v4';
const HEADERS  = { 'X-Auth-Token': API_KEY };
const PROXY    = 'https://corsproxy.io/?url=';

async function apiFetch(path) {
  const url = `${BASE_URL}${path}`;
  // Intento directo primero
  try {
    const r = await fetch(url, { headers: HEADERS, mode: 'cors' });
    if (r.ok) return r.json();
  } catch(_) {}
  // Fallback: proxy CORS
  const proxied = `${PROXY}${encodeURIComponent(url)}`;
  const r2 = await fetch(proxied, { headers: HEADERS });
  if (!r2.ok) {
    const txt = await r2.text();
    throw new Error(`API ${r2.status}: ${txt.slice(0,120)}`);
  }
  return r2.json();
}

  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);

}

/* ══════════════════════════════════════════
   API FETCH
══════════════════════════════════════════ */
async function loadAll() {
  setStatus('loading', 'Cargando datos en vivo…');
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.classList.add('spinning');

  try {
    const [mData, sData] = await Promise.all([
      apiFetch('/competitions/WC/matches?season=2026'),
      apiFetch('/competitions/WC/standings?season=2026')
    ]);

    apiMatches   = mData.matches || [];
    apiStandings = sData.standings || [];
    apiError     = null;
    lastUpdated  = new Date();

    const liveCount = apiMatches.filter(m => m.status === 'IN_PLAY' || m.status === 'PAUSED').length;
    if (liveCount > 0) {
      setStatus('live', `${liveCount} partido${liveCount>1?'s':''} en vivo · Act. ${timeStr(lastUpdated)}`);
    } else {
      setStatus('live', `Datos actualizados · ${timeStr(lastUpdated)}`);
    }

  } catch(e) {
    apiError = e.message;
    setStatus('error', `Error: ${e.message}`);
    console.error(e);
  }

  btn.disabled = false;
  btn.classList.remove('spinning');
  renderAll();
}

function setStatus(state, txt) {
  const dot = document.getElementById('api-dot');
  const label = document.getElementById('api-status-txt');
  dot.className = 'api-dot ' + state;
  label.textContent = txt;
}

function timeStr(d) {
  return d.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
}

/* ══════════════════════════════════════════
   MATCH HELPERS
══════════════════════════════════════════ */
function getMatchScore(m) {
  if (m.status === 'SCHEDULED' || m.status === 'TIMED') return null;
  const s = m.score?.fullTime;
  if (s == null || s.home == null) return null;
  return { h: s.home, a: s.away };
}

function matchBadge(m) {
  if (m.status === 'IN_PLAY' || m.status === 'PAUSED') {
    const min = m.minute ? `${m.minute}'` : 'En vivo';
    return `<span class="live-badge">${min}</span>`;
  }
  if (m.status === 'FINISHED') return `<span class="fin-badge">FIN</span>`;
  // scheduled: show local time
  const d = new Date(m.utcDate);
  const hhmm = d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Mexico_City'});
  return `<span class="sched-badge">${hhmm}</span>`;
}

function scoreHTML(m) {
  const sc = getMatchScore(m);
  if (!sc) {
    return `<span class="score-nil">vs</span>`;
  }
  return `<div class="score-box">
    <span>${sc.h}</span>
    <span class="score-sep">-</span>
    <span>${sc.a}</span>
  </div>`;
}

function matchDate(m) {
  const d = new Date(m.utcDate);
  return d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'short',timeZone:'America/Mexico_City'});
}

function groupLetter(m) {
  // group field is like "GROUP_A"
  if (m.group) return m.group.replace('GROUP_','');
  return '?';
}

/* ══════════════════════════════════════════
   TAB: GRUPOS — tabla oficial FIFA con datos en vivo
══════════════════════════════════════════ */
function buildGrupos() {
  const el = document.getElementById('grupos');

  // ── Helper: construir mapa de grupos desde apiMatches ──
  // La API de standings a veces devuelve todo en un solo array o mal agrupado.
  // Reconstruimos la tabla desde los partidos para mayor fiabilidad.
  function buildStandingsFromMatches() {
    if (!apiMatches || apiMatches.length === 0) return null;
    const groupMatches = apiMatches.filter(m => m.stage === 'GROUP_STAGE');
    if (groupMatches.length === 0) return null;

    // stats[groupLetter][teamName] = { pj, g, e, p, gf, gc, pts }
    const stats = {};

    groupMatches.forEach(m => {
      const gl = groupLetter(m); // 'A'..'L'
      if (!stats[gl]) stats[gl] = {};

      const hName = normName(m.homeTeam?.name || '');
      const aName = normName(m.awayTeam?.name || '');

      [hName, aName].forEach(t => {
        if (t && !stats[gl][t]) stats[gl][t] = { pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 };
      });

      const sc = m.score?.fullTime;
      if (!sc || sc.home == null || m.status === 'SCHEDULED' || m.status === 'TIMED') return;

      const hS = sc.home, aS = sc.away;
      if (!stats[gl][hName] || !stats[gl][aName]) return;

      stats[gl][hName].pj++;
      stats[gl][aName].pj++;
      stats[gl][hName].gf += hS; stats[gl][hName].gc += aS;
      stats[gl][aName].gf += aS; stats[gl][aName].gc += hS;

      if (hS > aS) {
        stats[gl][hName].g++; stats[gl][hName].pts += 3;
        stats[gl][aName].p++;
      } else if (hS < aS) {
        stats[gl][aName].g++; stats[gl][aName].pts += 3;
        stats[gl][hName].p++;
      } else {
        stats[gl][hName].e++; stats[gl][hName].pts++;
        stats[gl][aName].e++; stats[gl][aName].pts++;
      }
    });

    return stats;
  }

  function renderGroupTable(letter, teamsData) {
    // teamsData: array of { name, pj, g, e, p, gf, gc, pts }
    // Sort: pts desc, dg desc, gf desc
    const sorted = [...teamsData].sort((a,b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const dgA = a.gf - a.gc, dgB = b.gf - b.gc;
      if (dgB !== dgA) return dgB - dgA;
      return b.gf - a.gf;
    });

    let html = `<div class="standings-group">
      <div class="standings-group-title">Grupo ${letter}</div>
      <table class="standings-table">
        <thead><tr>
          <th style="min-width:120px">#&nbsp;&nbsp;Equipo</th>
          <th title="Partidos Jugados">PJ</th>
          <th title="Ganados">G</th>
          <th title="Empatados">E</th>
          <th title="Perdidos">P</th>
          <th title="Goles a favor">GF</th>
          <th title="Goles en contra">GC</th>
          <th title="Diferencia">DG</th>
          <th title="Puntos">Pts</th>
        </tr></thead><tbody>`;

    sorted.forEach((row, i) => {
      const owner = getOwner(row.name);
      const borderColor = owner ? P[owner].color : 'transparent';
      const chip = owner ? ownerChip(owner) : '';
      const dg = row.gf - row.gc;
      const dgStr = dg > 0 ? `+${dg}` : `${dg}`;
      const advancing = i < 2 && row.pj > 0;
      html += `<tr${advancing ? ' class="advancing"' : ''}>
        <td style="border-left:3px solid ${borderColor}">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="st-pos">${i+1}</span>
            <span>${row.name}</span>
            ${chip}
          </div>
        </td>
        <td>${row.pj}</td>
        <td>${row.g}</td>
        <td>${row.e}</td>
        <td>${row.p}</td>
        <td>${row.gf}</td>
        <td>${row.gc}</td>
        <td style="color:${dg>0?'var(--live)':dg<0?'#DC2626':'var(--text3)'};font-weight:600">${dgStr}</td>
        <td class="st-pts">${row.pts}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    return html;
  }

  // ── Intentar con datos de la API ──
  const statsMap = buildStandingsFromMatches();

  if (statsMap) {
    let html = '<div class="sec-eye">Posiciones en vivo · fase de grupos</div><div class="standings-grid">';
    // Iterar en orden A..L usando GF como fuente de verdad de equipos
    Object.entries(GF).forEach(([letter, teams]) => {
      const groupStats = statsMap[letter] || {};
      // Asegurar que todos los equipos del grupo aparecen aunque no hayan jugado
      const teamsData = teams.map(t => ({
        name: t,
        ...(groupStats[t] || { pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 })
      }));
      html += renderGroupTable(letter, teamsData);
    });
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  // ── Sin partidos aún: mostrar grupos vacíos ──
  if (apiError) {
    el.innerHTML = `<div class="error-box">⚠️ Sin conexión a la API.</div>`;
  }

  let html = '<div class="sec-eye">12 grupos · sin partidos aún</div><div class="standings-grid">';
  Object.entries(GF).forEach(([letter, teams]) => {
    const teamsData = teams.map(t => ({ name:t, pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 }));
    html += renderGroupTable(letter, teamsData);
  });
  html += '</div>';
  el.innerHTML = html;
}

/* ══════════════════════════════════════════
   TAB: TABLA — Marcador Apuesta 02 por jornada
══════════════════════════════════════════ */
function buildTabla() {
  const el = document.getElementById('tabla');

  // ── Calcular puntos por participante por jornada ──
  // Jornada = número de partido del equipo en el grupo (1°, 2° o 3° partido)
  // Usamos apiMatches filtrando GROUP_STAGE y ordenando por fecha para saber
  // cuál es el 1°, 2° y 3° partido de cada equipo

  function calcJornadas() {
    const source = (apiMatches && apiMatches.length > 0)
      ? apiMatches.filter(m => m.stage === 'GROUP_STAGE')
      : [];

    // Para cada equipo, rastrear en qué jornada va
    const teamMatchCount = {}; // teamName → [matchday count]

    // Ordenar por fecha para asignar correctamente jornada 1, 2, 3
    const sorted = [...source].sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate));

    // matchKey → jornada (1,2,3)
    const matchJornada = {};

    sorted.forEach(m => {
      const h = normName(m.homeTeam?.name || '');
      const a = normName(m.awayTeam?.name || '');
      if (!teamMatchCount[h]) teamMatchCount[h] = 0;
      if (!teamMatchCount[a]) teamMatchCount[a] = 0;
      teamMatchCount[h]++;
      teamMatchCount[a]++;
      // La jornada del partido es el número de partido que llevan ambos equipos
      // (deben ser iguales dentro del grupo)
      const j = teamMatchCount[h];
      matchJornada[m.id] = j;
    });

    // Ahora acumular puntos por participante por jornada
    // pts[participante][jornada] = puntos
    const pts = {};
    const played = {}; // cuántos partidos jugados por participante por jornada
    for (const name of Object.keys(P)) {
      pts[name] = { 1: 0, 2: 0, 3: 0 };
      played[name] = { 1: 0, 2: 0, 3: 0 };
    }

    sorted.forEach(m => {
      const sc = m.score?.fullTime;
      if (!sc || sc.home == null) return; // partido no jugado aún
      const hName = normName(m.homeTeam?.name || '');
      const aName = normName(m.awayTeam?.name || '');
      const j = matchJornada[m.id];
      if (!j || j > 3) return;

      const ph = getOwner(hName);
      const pa = getOwner(aName);

      // Resultado
      let hPts = 0, aPts = 0;
      if (sc.home > sc.away)       { hPts = 3; aPts = 0; }
      else if (sc.home < sc.away)  { hPts = 0; aPts = 3; }
      else                          { hPts = 1; aPts = 1; }

      if (ph) { pts[ph][j] += hPts; played[ph][j]++; }
      if (pa) { pts[pa][j] += aPts; played[pa][j]++; }
    });

    return { pts, played, totalMatches: sorted.length };
  }

  const { pts, played } = calcJornadas();

  // ── Determinar perdedor por jornada (menos puntos, solo si jornada terminó) ──
  function getLoser(j) {
    // Jornada terminada = todos los participantes tienen al menos 8 partidos jugados... 
    // pero como los equipos son 8 y cada uno juega 1 por jornada, esperamos 8 partidos por participante por jornada
    // Si nadie jugó en esa jornada, no hay perdedor aún
    const totals = Object.entries(pts).map(([name, pj]) => ({ name, pts: pj[j], played: played[name][j] }));
    const anyPlayed = totals.some(t => t.played > 0);
    if (!anyPlayed) return null;
    const minPts = Math.min(...totals.map(t => t.pts));
    const losers = totals.filter(t => t.pts === minPts);
    return { losers: losers.map(l => l.name), pts: minPts, finished: totals.every(t => t.played === 8) };
  }

  // ── Render ──
  let html = `
    <div class="sec-eye">Apuesta 02 · puntos por jornada</div>
    <div class="cal-notice" style="margin-bottom:1.25rem">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Victoria = 3 pts · Empate = 1 pt · Derrota = 0 pts · El de menos puntos por jornada paga $50
    </div>`;

  [1, 2, 3].forEach(j => {
    const loserInfo = getLoser(j);
    const jPlayed = Object.values(played).some(p => p[j] > 0);

    // Ordenar participantes por puntos en esta jornada (desc)
    const ranking = Object.entries(pts)
      .map(([name, pj]) => ({ name, pts: pj[j], played: played[name][j] }))
      .sort((a, b) => b.pts - a.pts);

    const maxPts = ranking[0]?.pts || 0;
    const minPts = ranking[ranking.length-1]?.pts || 0;

    html += `
      <div style="margin-bottom:1.5rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.06em;color:var(--text);text-transform:uppercase">
            Jornada ${j}
          </div>
          ${!jPlayed
            ? `<span style="font-size:11px;color:var(--text3);background:var(--bg3);padding:3px 10px;border-radius:99px;border:1px solid var(--line2)">Sin partidos aún</span>`
            : loserInfo?.finished
              ? `<span style="font-size:11px;font-weight:700;color:#DC2626;background:rgba(220,38,38,0.08);padding:3px 10px;border-radius:99px;border:1px solid rgba(220,38,38,0.2)">💸 Paga $50: ${loserInfo.losers.join(' y ')}</span>`
              : `<span style="font-size:11px;color:var(--gold);background:var(--gold-dim);padding:3px 10px;border-radius:99px;border:1px solid rgba(212,146,10,0.2)">⏳ En curso</span>`
          }
        </div>
        <div style="background:var(--panel);border:1px solid var(--line2);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05)">
          ${ranking.map((r, i) => {
            const c = P[r.name].color;
            const isLeader = r.pts === maxPts && jPlayed;
            const isLoser  = loserInfo && r.pts === minPts && jPlayed;
            const barW = maxPts > 0 ? Math.round((r.pts / (maxPts * 8)) * 100) : 0;
            // max posible = 8 equipos × 3 pts = 24
            const barPct = maxPts > 0 ? Math.round((r.pts / 24) * 100) : 0;
            return `
            <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line);position:relative;overflow:hidden">
              ${jPlayed ? `<div style="position:absolute;left:0;top:0;bottom:0;width:${barPct}%;background:${hexAlpha(c,0.07)};transition:width .6s"></div>` : ''}
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--text3);width:18px;text-align:center;position:relative;z-index:1">${i+1}</div>
              <div style="flex:1;position:relative;z-index:1">
                <div style="display:flex;align-items:center;gap:8px">
                  <div style="width:28px;height:28px;border-radius:8px;background:${c};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:rgba(255,255,255,0.9);flex-shrink:0">${r.name[0]}</div>
                  <span style="font-size:13px;font-weight:600;color:var(--text)">${r.name}</span>
                  ${isLeader && !isLoser ? `<span style="font-size:9px;font-weight:700;color:var(--live);background:var(--live-dim);padding:1px 7px;border-radius:99px">↑ LÍDER</span>` : ''}
                  ${isLoser && jPlayed ? `<span style="font-size:9px;font-weight:700;color:#DC2626;background:rgba(220,38,38,0.08);padding:1px 7px;border-radius:99px">💸 PAGA</span>` : ''}
                </div>
                <div style="font-size:10px;color:var(--text3);margin-top:2px">${r.played} partido${r.played!==1?'s':''} jugado${r.played!==1?'s':''}</div>
              </div>
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:${jPlayed?c:'var(--text3)'};position:relative;z-index:1;min-width:32px;text-align:right">
                ${jPlayed ? r.pts : '—'}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  });

  // ── Totales acumulados ──
  const totals = Object.entries(pts)
    .map(([name, pj]) => ({ name, total: pj[1]+pj[2]+pj[3], played: played[name][1]+played[name][2]+played[name][3] }))
    .sort((a,b) => b.total - a.total);

  const anyTotal = totals.some(t => t.played > 0);

  html += `
    <div style="margin-bottom:1.5rem">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.06em;color:var(--text);text-transform:uppercase;margin-bottom:10px">
        Acumulado total
      </div>
      <div style="background:var(--panel);border:1px solid var(--line2);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05)">
        ${totals.map((r, i) => {
          const c = P[r.name].color;
          const maxT = totals[0].total;
          const barPct = maxT > 0 ? Math.round((r.total / 72) * 100) : 0; // 72 = 8 equipos × 3 jornadas × 3 pts
          return `
          <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line);position:relative;overflow:hidden">
            ${anyTotal ? `<div style="position:absolute;left:0;top:0;bottom:0;width:${barPct}%;background:${hexAlpha(c,0.07)};transition:width .6s"></div>` : ''}
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--text3);width:18px;text-align:center;position:relative;z-index:1">${i+1}</div>
            <div style="flex:1;position:relative;z-index:1">
              <div style="display:flex;align-items:center;gap:8px">
                <div style="width:28px;height:28px;border-radius:8px;background:${c};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:rgba(255,255,255,0.9);flex-shrink:0">${r.name[0]}</div>
                <span style="font-size:13px;font-weight:600;color:var(--text)">${r.name}</span>
              </div>
              <div style="font-size:10px;color:var(--text3);margin-top:2px">${r.played} partidos jugados</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;position:relative;z-index:1">
              <div style="text-align:center">
                <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)">J1</div>
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text2)">${pts[r.name][1]}</div>
              </div>
              <div style="text-align:center">
                <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)">J2</div>
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text2)">${pts[r.name][2]}</div>
              </div>
              <div style="text-align:center">
                <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)">J3</div>
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text2)">${pts[r.name][3]}</div>
              </div>
              <div style="text-align:center;margin-left:4px;padding-left:10px;border-left:1px solid var(--line2)">
                <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)">Total</div>
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:${anyTotal?c:'var(--text3)'}">${anyTotal?r.total:'—'}</div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  el.innerHTML = html;
}

function skeletonStandings() {
  let h = '<div class="standings-grid">';
  for(let i=0;i<6;i++) h += `<div><div class="skeleton" style="height:22px;border-radius:6px 6px 0 0;margin-bottom:0"></div><div class="skeleton" style="height:110px;border-radius:0 0 6px 6px"></div></div>`;
  return h + '</div>';
}

function fallbackTabla() {
  return `<div style="font-size:13px;color:var(--text2);padding:12px">Tabla no disponible hasta el inicio del torneo.</div>`;
}

/* ══════════════════════════════════════════
   TAB: CALENDARIO (LIVE SCORES)
══════════════════════════════════════════ */
function buildCalendario() {
  const el = document.getElementById('calendario');

  let matches;

  if (apiMatches && apiMatches.length > 0) {
    // Use live API matches (group stage only)
    matches = apiMatches.filter(m => m.stage === 'GROUP_STAGE');
  } else if (apiError) {
    el.innerHTML = `<div class="error-box">⚠️ ${apiError}</div>` + buildCalendarioStatic();
    return;
  } else {
    // Still loading — show static + skeleton hint
    el.innerHTML = `<div class="sec-eye">Fase de grupos · todos los partidos</div>
      <div class="cal-notice">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Cargando datos en vivo…
      </div>` + skeletonCalendario();
    return;
  }

  // Group by date
  const byDay = {};
  matches.forEach(m => {
    const day = matchDate(m);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(m);
  });

  let dc = 0;
  let html = `<div class="sec-eye">Fase de grupos · datos en vivo</div>
    <div class="cal-notice">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      Borde dorado = duelo directo · verde = en vivo
    </div>`;

  Object.entries(byDay).forEach(([day, dayMatches]) => {
    html += `<div class="day-block"><div class="day-label">${day}</div>`;
    dayMatches.forEach(m => {
      const hName = normName(m.homeTeam?.name || '');
      const aName = normName(m.awayTeam?.name || '');
      const ph = getOwner(hName), pa = getOwner(aName);
      const isDuel = ph && pa && ph !== pa;
      const isLive = m.status === 'IN_PLAY' || m.status === 'PAUSED';
      if (isDuel) dc++;

      const hChip = ph ? ownerChip(ph) : '';
      const aChip = pa ? ownerChip(pa) : '';
      const leftColor = ph ? P[ph].color : (isLive ? '#16A34A' : 'transparent');
      const cardClass = isLive ? 'match-card live-card' : (isDuel ? 'match-card duel' : 'match-card');

      html += `
        <div class="${cardClass}" style="border-left:3px solid ${leftColor}">
          <div class="m-team-col">
            <div class="m-team-name">${hName || m.homeTeam?.name || '?'}</div>
            ${hChip}
          </div>
          <div class="m-center-col">
            ${scoreHTML(m)}
            ${matchBadge(m)}
            <div class="m-meta-row">
              <span class="m-group-tag">G${groupLetter(m)}</span>
              ${isDuel ? '<span class="m-duel-tag">⚡ Duelo</span>' : ''}
            </div>
          </div>
          <div class="m-team-col right">
            <div class="m-team-name">${aName || m.awayTeam?.name || '?'}</div>
            ${aChip}
          </div>
        </div>`;
    });
    html += '</div>';
  });

  document.getElementById('duel-count').textContent = dc;
  el.innerHTML = html;
}

function skeletonCalendario() {
  let h = '';
  for(let i=0;i<6;i++) h += `<div class="skel-card skeleton"></div>`;
  return h;
}

/* ══════════════════════════════════════════
   TAB: APUESTAS
══════════════════════════════════════════ */
function buildApuestas() {
  let dc = 0, duels = [];

  const source = (apiMatches && apiMatches.length > 0)
    ? apiMatches.filter(m => m.stage === 'GROUP_STAGE')
    : [];

  if (source.length > 0) {
    source.forEach(m => {
      const hName = normName(m.homeTeam?.name || '');
      const aName = normName(m.awayTeam?.name || '');
      const ph = getOwner(hName), pa = getOwner(aName);
      if (ph && pa && ph !== pa) {
        dc++;
        const day = matchDate(m);
        const sc = getMatchScore(m);
        duels.push({ d: day, h: hName, a: aName, ph, pa,
          g: groupLetter(m), status: m.status, score: sc });
      }
    });
  }

  document.getElementById('duel-count').textContent = dc || '—';

  const el = document.getElementById('apuestas');
  el.innerHTML = `
    <div class="sec-eye">Opciones de apuesta</div>
    <div class="bet-grid">
      <div class="bet-card">
        <div class="bet-num">Opción 01</div>
        <div class="bet-title">Apuesta por partido directo</div>
        <div class="bet-body">Cuando dos equipos de distintos participantes se enfrentan, ambos ponen $20. El ganador se lleva $40. En empate se devuelve o acumula al bote.</div>
        <div class="bet-chips">
          <span class="chip">$20 por partido</span>
          <span class="chip">${dc||'?'} duelos en grupos</span>
        </div>
      </div>
      <div class="bet-card">
        <div class="bet-num">Opción 02</div>
        <div class="bet-title">Puntos por jornada</div>
        <div class="bet-body">Victoria = 3 pts, empate = 1, derrota = 0. Al final de cada jornada, el participante con menos puntos paga $50 a un bote extra.</div>
        <div class="bet-chips">
          <span class="chip">$50 por jornada</span>
          <span class="chip">3 jornadas</span>
        </div>
      </div>
      <div class="bet-card rec">
        <div class="bet-num">Opción 03 — Recomendada</div>
        <div class="bet-title">Combinada</div>
        <div class="bet-body">$200 por el campeón más $10–$20 en cada duelo directo. Emoción en cada partido y también al final.</div>
        <div class="bet-chips">
          <span class="chip">Máxima emoción</span>
          <span class="chip">Todos los partidos cuentan</span>
        </div>
      </div>
    </div>

    <div class="sec-eye" style="margin-top:1rem">Los ${dc||'?'} duelos directos · fase de grupos</div>
    <div>
      ${duels.length === 0
        ? `<div style="font-size:13px;color:var(--text2);padding:8px 0">Los duelos aparecerán aquí una vez que carguen los datos de la API.</div>`
        : duels.map(d => {
          const sc = d.score;
          const scHTML = sc
            ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--text)">${sc.h} - ${sc.a}</span>`
            : '';
          const badge = d.status === 'IN_PLAY' || d.status === 'PAUSED'
            ? `<span class="live-badge">En vivo</span>`
            : d.status === 'FINISHED'
            ? `<span class="fin-badge">FIN</span>`
            : '';
          return `
          <div class="duel-row" style="border-left:3px solid ${P[d.ph].color}">
            <div class="duel-date">${d.d}</div>
            <div class="duel-vs">
              <div class="duel-team"><span>${d.h}</span>${ownerChip(d.ph)}</div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
                ${scHTML}
                ${badge}
                <span class="duel-slash">vs</span>
              </div>
              <div class="duel-team"><span>${d.a}</span>${ownerChip(d.pa)}</div>
            </div>
            <div class="duel-group">G${d.g}</div>
          </div>`;
        }).join('')}
    </div>`;
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
buildLegend();
buildEquipos();
buildGrupos();
buildTabla();
buildCalendario();
buildApuestas();

// Load live data
loadAll();

// Auto-refresh every 60s if there are live matches
setInterval(() => {
  if (apiMatches && apiMatches.some(m => m.status === 'IN_PLAY' || m.status === 'PAUSED')) {
    loadAll();
  }
}, 60000);
</script>
</body>
</html>
